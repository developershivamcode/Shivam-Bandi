<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title>Loyal Bandi</title>

<style>

*{
    margin:0;
    padding:0;
    box-sizing:border-box;
    font-family:Arial,sans-serif;
}

body{
    background:#0f172a;
    height:100vh;
}

.chat-container{
    width:95%;
    max-width:1000px;
    height:95vh;
    margin:auto;
    margin-top:10px;
    background:#1e293b;
    border-radius:15px;
    display:flex;
    flex-direction:column;
    overflow:hidden;
}

.header{
    background:#2563eb;
    color:white;
    padding:20px;
    text-align:center;
    font-size:24px;
    font-weight:bold;
}

.messages{
    flex:1;
    overflow-y:auto;
    padding:20px;
}

.message{
    margin:10px 0;
    max-width:75%;
    padding:12px;
    border-radius:12px;
    word-wrap:break-word;
}

.user{
    background:#2563eb;
    color:white;
    margin-left:auto;
}

.bot{
    background:#334155;
    color:white;
}

.input-area{
    display:flex;
    padding:15px;
    background:#0f172a;
}

input{
    flex:1;
    padding:15px;
    border:none;
    border-radius:10px;
    font-size:16px;
}

button{
    margin-left:10px;
    padding:15px 25px;
    border:none;
    border-radius:10px;
    background:#2563eb;
    color:white;
    cursor:pointer;
}

button:hover{
    opacity:.9;
}

</style>
</head>

<body>

<div class="chat-container">

<div class="header">
🤖 AI Loyal Bandi
</div>

<div id="messages" class="messages">

<div class="message bot">
Hello jaan❤️<br>
Mai Loyal Bandi hoon, aapka AI assistant. Aap mujhse kuch bhi pooch sakte hain ya baat kar sakte hain. Main aapki madad ke liye ready hoon! 😊
</div>

</div>

<div class="input-area">
<input
id="msg"
type="text"
placeholder="Type a message..."
onkeydown="if(event.key==='Enter') sendMessage()"
>

<button onclick="sendMessage()">
Send
</button>
</div>

</div>

<script>

async function sendMessage(){

    const input=document.getElementById("msg");
    const box=document.getElementById("messages");

    const message=input.value.trim();

    if(!message) return;

    box.innerHTML += `
    <div class="message user">
        ${message}
    </div>
    `;

    input.value="";

    box.innerHTML += `
    <div id="loading" class="message bot">
        Bandi is typing...
    </div>
    `;

    box.scrollTop=box.scrollHeight;

    try{

        const response=await fetch("/chat",{
            method:"POST",
            headers:{
                "Content-Type":"application/json"
            },
            body:JSON.stringify({
                message:message
            })
        });

        const data=await response.json();

        document.getElementById("loading").remove();

        box.innerHTML += `
        <div class="message bot">
            ${data.reply}
        </div>
        `;

    }catch(error){

        document.getElementById("loading").remove();

        box.innerHTML += `
        <div class="message bot">
            Error: ${error}
        </div>
        `;
    }

    box.scrollTop=box.scrollHeight;
}

</script>

</body>
</html>
